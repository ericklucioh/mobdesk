name: Release

on:
  push:
    branches: [main, stage]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release branch
        shell: bash
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            main|stage)
              ;;
            *)
              echo "Unsupported release branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Install SVU
        run: |
          go install github.com/caarlos0/svu/v3@v3.4.1
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Calculate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" == "stage" ]]; then
            svu_config=.svu-stage.yml
            current="$(svu current --config "${svu_config}")"
            next="$(svu next --config "${svu_config}")"
            prerelease=true
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            svu_config=.svu.yml
            current="$(svu current --config "${svu_config}")"
            next="$(svu next --config "${svu_config}")"
            prerelease=false
          else
            echo "Unsupported release branch: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          echo "Current version: ${current}"
          echo "Next version: ${next}"

          if [[ "${GITHUB_REF_NAME}" == "main" && "${next}" == "${current}" ]]; then
            echo "release=false" >> "${GITHUB_OUTPUT}"
            echo "No release-worthy change found on main."
            exit 0
          fi

          {
            echo "release=true"
            echo "version=${next}"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build Mobdesk for Termux ARM64
        if: steps.version.outputs.release == 'true'
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags='-s -w' \
            -o dist/mobdesk-linux-arm64 ./cmd/mobdesk
          sha256sum dist/mobdesk-linux-arm64 > dist/SHA256SUMS

      - name: Create and push version tag
        if: steps.version.outputs.release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "${VERSION}" -m "release: ${VERSION}"
          git push origin "${VERSION}"

      - name: Create GitHub Release
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          release_args=(
            "${VERSION}"
            dist/mobdesk-linux-arm64
            dist/SHA256SUMS
            --title "Mobdesk ${VERSION}"
            --generate-notes
          )
          if [[ "${PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "${release_args[@]}"

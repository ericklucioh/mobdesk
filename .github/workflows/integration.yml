name: Termux integration

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  termux:
    name: Termux Docker integration after stage merge
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'stage'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Run Termux integration
        run: ./scripts/test-termux.sh

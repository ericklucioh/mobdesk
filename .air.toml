root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/mobdesk ./cmd/mobdesk"
entrypoint = ["./tmp/mobdesk"]
include_ext = ["go", "mod", "sum"]
exclude_dir = ["tmp", "bin", ".git", "docs"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true
